name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        working-directory: /home/evolab/RAG-Blockchain
        run: git pull origin main

      - name: Deploy with Docker Compose
        working-directory: /home/evolab/RAG-Blockchain
        run: docker compose up --build -d
