{% if request.session.task_active and task %}
<div id="task-float-panel"
     class="fixed top-24 right-4 w-[300px] z-[9999] rounded-xl shadow-lg overflow-hidden bg-gradient-to-br from-[#B54957] to-[#EBA9A9] border border-white/30 text-white">

  <!-- 標題列（拖曳區） -->
  <div id="task-panel-header"
       class="flex items-center justify-between gap-3 px-4 py-3 border-b border-white/25 cursor-move select-none"
       onmousedown="startDrag(event)">
    <div class="flex items-center gap-2 min-w-0">
      <span class="text-sm font-semibold">目前任務</span>
      <span class="text-xs px-2 py-0.5 rounded-md bg-white/90 text-[#9F353A] font-semibold">
        {{ request.session.current_task_index|add:1 }} / {{ total_tasks }}
      </span>
    </div>
    <button type="button"
            id="task-toggle-btn"
            class="shrink-0 w-7 h-7 rounded-md border border-white/40 bg-white/15 text-white flex items-center justify-center hover:bg-white/25 transition-colors"
            onclick="toggleTaskPanel()"
            onmousedown="event.stopPropagation()">
      <span id="task-toggle-icon"><i data-lucide="chevron-up" class="w-3 h-3"></i></span>
    </button>
  </div>

  <!-- 內容區 -->
  <div id="task-panel-body" class="p-4 bg-white/90 text-ink">
    <span class="inline-block text-xs px-2 py-0.5 rounded-md mb-2 bg-[#FBE9EA] border border-[#EBA9A9] text-[#9F353A] mb-2 font-medium">
      題目 {{ request.session.current_task_index|add:1 }}
    </span>
    <p class="m-0 text-sm text-ink text-justify">{{ task.description }}</p>
  </div>

</div>
{% endif %}
